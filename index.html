<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Command Center - MAX</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100%; height: calc(100% - 45px); position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 1. مربع البث المباشر المطور (قابل للتكبير والتصغير بسلاسة) */
        #live-tv-container {
            position: absolute; top: 15px; left: 15px; width: 350px; height: 220px;
            min-width: 250px; min-height: 180px; max-width: 800px; max-height: 600px;
            background: #111; border: 2px solid #c00; border-radius: 8px; z-index: 1000;
            box-shadow: 0 0 15px rgba(204,0,0,0.5); display: flex; flex-direction: column;
            resize: both; overflow: auto; padding-bottom: 15px; /* مساحة لمقبض السحب */
        }
        .tv-header { background: #c00; padding: 5px 10px; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; user-select: none; }
        .live-indicator { animation: blink 1s infinite; color: #fff; }
        #live-tv-container iframe { width: 100%; height: 100%; border: none; flex-grow: 1; pointer-events: auto; }

        /* 2. دليل المستخدم */
        #legend-box {
            position: absolute; top: 15px; right: 15px; width: 260px;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #444; border-radius: 5px; z-index: 1000;
            padding: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.7); backdrop-filter: blur(5px);
        }
        #legend-box h3 { margin: 0 0 10px 0; font-size: 14px; color: #ffcc00; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 12px; color: #ccc; }
        .legend-icon { width: 25px; text-align: center; margin-left: 10px; font-size: 14px; }

        /* 3. شريط الأخبار الجذري (تم إصلاح التعليق) */
        #news-ticker {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: #111; border-top: 2px solid #c00; z-index: 1000; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-title { background: #c00; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: bold; z-index: 10; position: relative; box-shadow: -5px 0 10px rgba(0,0,0,0.5); }
        .ticker-content { flex-grow: 1; overflow: hidden; white-space: nowrap; position: relative; height: 100%; display: flex; align-items: center; }
        
        .scrolling-text {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-move 45s linear infinite;
            font-size: 16px; color: #fff;
        }
        .news-item { margin-left: 40px; }
        .news-source { color: #ffcc00; font-weight: bold; margin-left: 5px; }

        /* 4. تصميم الإنذار المركزي الفوري */
        #red-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.15); z-index: 9998; display: none; pointer-events: none;
            animation: flash-bg 0.4s infinite alternate;
        }
        #center-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #a00; border: 4px solid #f33; border-radius: 12px;
            color: white; padding: 40px 60px; text-align: center; z-index: 9999;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
        }
        #center-alert.show { transform: translate(-50%, -50%) scale(1); }
        #center-alert i { font-size: 60px; color: #ffcc00; margin-bottom: 20px; animation: pulse 0.5s infinite; }
        #center-alert h1 { margin: 0; font-size: 40px; font-weight: 900; letter-spacing: 2px; }
        #center-alert p { font-size: 20px; margin-top: 15px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px;}

        /* الأيقونات */
        .strike-icon { color: #f33; font-size: 26px; animation: pulse 0.8s infinite; text-shadow: 0 0 15px #f00; }
        .plane-icon { color: #0cf; font-size: 18px; text-shadow: 0 0 8px #0cf; }

        /* الأنيميشن */
        @keyframes ticker-move { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes flash-bg { from { background: rgba(255, 0, 0, 0.1); } to { background: rgba(255, 0, 0, 0.4); } }
    </style>
</head>
<body>

    <div id="red-alert-overlay"></div>
    <div id="center-alert">
        <i class="fas fa-exclamation-triangle"></i>
        <h1>إنذار هجوم فوري</h1>
        <p id="alert-message">جاري تحديد الموقع...</p>
    </div>

    <div id="map"></div>

    <div id="live-tv-container">
        <div class="tv-header">
            <span>الجزيرة | Live TV</span>
            <span class="live-indicator">● LIVE</span>
        </div>
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCfiwzLy-8yKzIbsmZTzxDgw&autoplay=1&mute=1" allowfullscreen></iframe>
    </div>

    <div id="legend-box">
        <h3><i class="fas fa-crosshairs"></i> بيانات الرصد</h3>
        <div class="legend-item"><div class="legend-icon" style="color: #0cf;"><i class="fas fa-plane"></i></div><span>رادار الطيران (تحديث 30ث)</span></div>
        <div class="legend-item"><div class="legend-icon strike-icon"><i class="fas fa-bullseye"></i></div><span>الذكاء الاصطناعي (فلتر دقيق جداً)</span></div>
        <div class="legend-item"><div class="legend-icon" style="color: #fc0;"><i class="fas fa-bolt"></i></div><span>أخبار عاجلة (تحديث 60ث)</span></div>
    </div>

    <div id="news-ticker">
        <div class="ticker-title">عاجل ⚡</div>
        <div class="ticker-content">
            <div class="scrolling-text" id="ticker-text">
                جاري الاتصال بوكالات الأنباء وسحب البيانات المشفرة...
            </div>
        </div>
    </div>

    <script>
        // إعداد الخريطة
        const map = L.map('map', {zoomControl: false}).setView([27.0, 45.0], 5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // قاعدة بيانات المواقع (الدقيقة)
        const locationDB = [
            { name: "السعودية", keywords: ["الرياض", "السعودية", "جدة", "الدمام"], lat: 24.7136, lng: 46.6753 },
            { name: "الإمارات", keywords: ["أبوظبي", "الامارات", "الإمارات", "دبي"], lat: 24.4539, lng: 54.3773 },
            { name: "قطر", keywords: ["الدوحة", "قطر"], lat: 25.2854, lng: 51.5310 },
            { name: "إيران", keywords: ["طهران", "ايران", "إيران", "أصفهان"], lat: 35.6892, lng: 51.3890 },
            { name: "إسرائيل", keywords: ["تل ابيب", "اسرائيل", "إسرائيل", "القدس"], lat: 32.0853, lng: 34.7818 },
            { name: "لبنان", keywords: ["بيروت", "لبنان", "الضاحية"], lat: 33.8938, lng: 35.5018 },
            { name: "العراق", keywords: ["بغداد", "العراق", "أربيل"], lat: 33.3152, lng: 44.3661 },
            { name: "سوريا", keywords: ["دمشق", "سوريا"], lat: 33.5138, lng: 36.2765 },
            { name: "اليمن", keywords: ["صنعاء", "اليمن", "الحديدة", "حوثي"], lat: 15.3694, lng: 44.1910 },
            { name: "أمريكا", keywords: ["واشنطن", "أمريكا", "البنتاغون"], lat: 38.8951, lng: -77.0364 }
        ];

        // 1. كلمات تفعيل الهجوم (إيجابية)
        const attackKeywords = ["قصف", "انفجار", "استهداف", "غارة", "هجوم", "صاروخ", "مسيرة", "اغتيال", "مقتل", "غارات"];
        
        // 2. كلمات التحييد (السر في دقة الذكاء الاصطناعي - تمنع إطلاق الإنذار الكاذب)
        const ignoreKeywords = ["إدانة", "استنكار", "تحذير", "مناورات", "تدريب", "قلق", "مباحثات", "اتصال", "يرفض", "ينفي", "يندد", "اجتماع", "تصريح"];

        let strikeMarkers = [];
        let flightMarkers = [];
        let alertActive = false;
        let processedNews = new Set();
        let isFirstLoad = true; 

        // دالة الإنذار الفوري
        function triggerImmediateAlert(countryName, headline) {
            if(alertActive) return;
            alertActive = true;
            
            const alertBox = document.getElementById('center-alert');
            const alertOverlay = document.getElementById('red-alert-overlay');
            const alertMsg = document.getElementById('alert-message');
            
            alertMsg.innerHTML = `الموقع المستهدف: <b style="color:#fc0;">${countryName}</b><br>${headline}`;
            
            alertOverlay.style.display = 'block';
            alertBox.classList.add('show');

            // إخفاء تلقائي بعد 12 ثانية
            setTimeout(() => {
                alertBox.classList.remove('show');
                alertOverlay.style.display = 'none';
                alertActive = false;
            }, 12000); 
        }

        async function fetchLiveNews() {
            const targetUrl = encodeURIComponent(`https://www.skynewsarabia.com/rss?nocache=${new Date().getTime()}`);
            const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=${targetUrl}`;
            
            try {
                const response = await fetch(rssUrl);
                const data = await response.json();
                
                if(data.status === 'ok') {
                    let newsHtml = "";
                    const articles = data.items.slice(0, 15);
                    
                    strikeMarkers.forEach(m => map.removeLayer(m));
                    strikeMarkers = [];
                    
                    articles.forEach(article => {
                        newsHtml += `<span class="news-item"><span class="news-source">[عاجل]</span> ${article.title}</span>`;
                        
                        let isNewArticle = !processedNews.has(article.title);
                        if(isNewArticle) processedNews.add(article.title);
                        
                        // الذكاء الاصطناعي المعزز: الفحص الثلاثي
                        let matchedLocation = null;
                        let isAttack = false;
                        let isFalseAlarm = false; // فحص الإشاعات والأخبار السياسية

                        // هل يوجد كلمة مستبعدة؟
                        ignoreKeywords.forEach(ignore => {
                            if(article.title.includes(ignore)) isFalseAlarm = true;
                        });

                        // إذا لم يكن خبراً سياسياً، هل هو هجوم فعلي؟
                        if(!isFalseAlarm) {
                            attackKeywords.forEach(attack => { 
                                if(article.title.includes(attack)) isAttack = true; 
                            });

                            locationDB.forEach(loc => {
                                loc.keywords.forEach(keyword => {
                                    if(article.title.includes(keyword)) matchedLocation = loc;
                                });
                            });
                        }

                        // التنفيذ فقط إذا كان هجوماً مؤكداً ومكانه معروفاً
                        if(isAttack && matchedLocation && !isFalseAlarm) {
                            const strikeIcon = L.divIcon({ html: '<i class="fas fa-bullseye"></i>', className: 'strike-icon', iconSize: [26, 26] });
                            const marker = L.marker([matchedLocation.lat, matchedLocation.lng], {icon: strikeIcon}).addTo(map);
                            strikeMarkers.push(marker);
                            
                            // إطلاق الإنذار الفوري فقط للخبر الجديد
                            if(isNewArticle && !isFirstLoad) {
                                triggerImmediateAlert(matchedLocation.name, article.title);
                                map.flyTo([matchedLocation.lat, matchedLocation.lng], 7, {animate: true, duration: 2});
                            }
                        }
                    });
                    
                    // تحديث الشريط بسلاسة تامة
                    document.getElementById('ticker-text').innerHTML = newsHtml;
                    isFirstLoad = false;
                }
            } catch (e) { console.error("News API Rate Limit", e); }
        }

        // رادار طيران أدق وأسرع
        async function fetchRealFlights() {
            // صندوق إحداثيات مركز على الشرق الأوسط
            const api = 'https://opensky-network.org/api/states/all?lamin=10.0&lomin=30.0&lamax=40.0&lomax=65.0';
            try {
                const res = await fetch(api);
                const data = await res.json();
                
                flightMarkers.forEach(m => map.removeLayer(m));
                flightMarkers = [];
                
                if(data.states) {
                    const flights = data.states.slice(0, 50); // سحب 50 طائرة لدقة أعلى
                    flights.forEach(flight => {
                        const lng = flight[5];
                        const lat = flight[6];
                        const angle = flight[10] || 0; 
                        const callsign = flight[1] || "مجهول";

                        if(lat && lng) {
                            const planeIcon = L.divIcon({ 
                                html: `<div style="transform: rotate(${angle}deg);"><i class="fas fa-plane"></i></div>`, 
                                className: 'plane-icon', 
                                iconSize: [20, 20] 
                            });
                            const marker = L.marker([lat, lng], {icon: planeIcon})
                                            .addTo(map)
                                            .bindPopup(`<b>رقم الرحلة:</b> ${callsign}<br><b>الارتفاع:</b> ${flight[7]} م`);
                            flightMarkers.push(marker);
                        }
                    });
                }
            } catch(e) { console.error("Flight API Rate Limit", e); }
        }

        // تشغيل فوري
        fetchLiveNews();
        fetchRealFlights();
        
        // السرعة القصوى المسموحة للـ APIs المجانية
        setInterval(fetchLiveNews, 60000);   // تحديث الأخبار كل دقيقة واحدة
        setInterval(fetchRealFlights, 30000); // تحديث الرادار كل 30 ثانية
    </script>
</body>
</html>
