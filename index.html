<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Command Center - Live</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100%; height: calc(100% - 45px); position: absolute; z-index: 1; }
        
        #live-tv-box {
            position: absolute; top: 15px; left: 15px; width: 320px; height: 190px;
            background: rgba(0,0,0,0.8); border: 1px solid #c00; border-radius: 5px; z-index: 1000;
            box-shadow: 0 0 10px rgba(204,0,0,0.3); overflow: hidden; display: flex; flex-direction: column;
        }
        .tv-header { background: #c00; padding: 5px 10px; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; }
        .live-indicator { animation: blink 1s infinite; color: #fff; }

        #legend-box {
            position: absolute; top: 15px; right: 15px; width: 250px;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #444; border-radius: 5px; z-index: 1000;
            padding: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.7); backdrop-filter: blur(5px);
        }
        #legend-box h3 { margin: 0 0 10px 0; font-size: 14px; color: #ffcc00; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 12px; color: #ccc; }
        .legend-icon { width: 20px; text-align: center; margin-left: 10px; font-size: 14px; }

        #news-ticker {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: #111; border-top: 2px solid #c00; z-index: 1000; display: flex; align-items: center;
        }
        .ticker-title { background: #c00; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: bold; z-index: 2; }
        .ticker-content { flex-grow: 1; overflow: hidden; position: relative; white-space: nowrap; }
        .scrolling-text { display: inline-block; padding-left: 100%; animation: scroll-left 40s linear infinite; color: #fff; font-size: 15px; }
        .news-source { color: #ffcc00; font-weight: bold; margin-left: 5px; }

        .strike-icon { color: #ff3333; font-size: 24px; animation: pulse 1s infinite; text-shadow: 0 0 10px #f00; }
        .plane-icon { color: #00ccff; font-size: 16px; transition: transform 0.5s; text-shadow: 0 0 5px #00ccff; }

        @keyframes scroll-left { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="live-tv-box">
        <div class="tv-header">
            <span>الجزيرة | Al Jazeera Live</span>
            <span class="live-indicator">● LIVE</span>
        </div>
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=UCfiwzLy-8yKzIbsmZTzxDgw&autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="legend-box">
        <h3><i class="fas fa-satellite-dish"></i> دليل غرفة العمليات</h3>
        <div class="legend-item">
            <div class="legend-icon" style="color: #00ccff;"><i class="fas fa-plane"></i></div>
            <span>رصد حي ومباشر لحركة الطيران المدني والتجاري.</span>
        </div>
        <div class="legend-item">
            <div class="legend-icon strike-icon"><i class="fas fa-bullseye"></i></div>
            <span>تحليل ذكي: النقطة تظهر فقط عند تطابق (اسم الموقع + حدث أمني) في الخبر.</span>
        </div>
        <div class="legend-item">
            <div class="legend-icon" style="color: #ffcc00;"><i class="fas fa-bolt"></i></div>
            <span>الشريط السفلي: أخبار عاجلة حقيقية تحدث كل 3 دقائق.</span>
        </div>
    </div>

    <div id="news-ticker">
        <div class="ticker-title">غرفة الأخبار ⚡</div>
        <div class="ticker-content">
            <div class="scrolling-text" id="ticker-text">
                جاري الاتصال وسحب البيانات الحية...
            </div>
        </div>
    </div>

    <script>
        const map = L.map('map', {zoomControl: false}).setView([27.0, 50.0], 5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // قاعدة بيانات المواقع
        const locationDB = [
            { keywords: ["الرياض", "السعودية"], lat: 24.7136, lng: 46.6753 },
            { keywords: ["جدة", "أرامكو"], lat: 21.4858, lng: 39.1925 },
            { keywords: ["أبوظبي", "الامارات", "الإمارات"], lat: 24.4539, lng: 54.3773 },
            { keywords: ["دبي", "جبل علي"], lat: 25.2048, lng: 55.2708 },
            { keywords: ["الدوحة", "قطر", "العديد"], lat: 25.2854, lng: 51.5310 },
            { keywords: ["الرويس", "راس لفان"], lat: 26.13, lng: 51.20 },
            { keywords: ["الكويت"], lat: 29.3759, lng: 47.9774 },
            { keywords: ["البحرين"], lat: 26.2285, lng: 50.5860 },
            { keywords: ["مسقط", "عمان"], lat: 23.5859, lng: 58.4059 },
            { keywords: ["طهران", "ايران", "إيران"], lat: 35.6892, lng: 51.3890 },
            { keywords: ["أصفهان", "نطنز"], lat: 32.6539, lng: 51.6660 },
            { keywords: ["مضيق هرمز", "جزيرة خرج"], lat: 26.5000, lng: 56.2500 },
            { keywords: ["تل ابيب", "اسرائيل", "إسرائيل"], lat: 32.0853, lng: 34.7818 },
            { keywords: ["القدس"], lat: 31.7683, lng: 35.2137 },
            { keywords: ["بيروت", "لبنان", "الضاحية"], lat: 33.8938, lng: 35.5018 },
            { keywords: ["بغداد", "العراق"], lat: 33.3152, lng: 44.3661 },
            { keywords: ["أربيل"], lat: 36.1901, lng: 44.0092 },
            { keywords: ["دمشق", "سوريا", "الجولان"], lat: 33.5138, lng: 36.2765 },
            { keywords: ["عمان", "الأردن"], lat: 31.9454, lng: 35.9284 },
            { keywords: ["صنعاء", "اليمن", "حوثي"], lat: 15.3694, lng: 44.1910 },
            { keywords: ["الحديدة", "البحر الأحمر"], lat: 14.7978, lng: 42.9545 },
            { keywords: ["واشنطن", "أمريكا", "البنتاغون"], lat: 38.8951, lng: -77.0364 }
        ];

        // الكلمات المفتاحية الأمنية (شرط أساسي لظهور النقطة الحمراء)
        const actionKeywords = ["قصف", "انفجار", "استهداف", "غارة", "هجوم", "اعتراض", "صاروخ", "مسيرة", "اشتباك", "دوي", "حريق", "غارات", "تدمير", "مقتل"];

        // دالة تشغيل صوت إنذار قصير
        function playAlertSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15); // صوت قصير جداً
            } catch(e) {}
        }

        let strikeMarkers = [];

        async function fetchLiveNews() {
            const rssUrl = 'https://api.rss2json.com/v1/api.json?rss_url=https://www.skynewsarabia.com/rss';
            try {
                const response = await fetch(rssUrl);
                const data = await response.json();
                
                if(data.status === 'ok') {
                    let newsHtml = "";
                    const articles = data.items.slice(0, 15);
                    let newAlertFound = false;

                    // مسح العلامات الحمراء القديمة حتى لا تتراكم
                    strikeMarkers.forEach(m => map.removeLayer(m));
                    strikeMarkers = [];
                    
                    articles.forEach(article => {
                        newsHtml += `<span class="news-source">[عاجل]</span> ${article.title} &nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp; `;
                        
                        // الفلتر الذكي المزدوج (يجب أن يحتوي الخبر على "مكان" + "حدث أمني")
                        let hasLocation = false;
                        let matchedLocation = null;
                        let hasAction = false;

                        // التحقق من وجود كلمة أمنية
                        actionKeywords.forEach(action => {
                            if(article.title.includes(action)) hasAction = true;
                        });

                        // التحقق من وجود مكان
                        locationDB.forEach(loc => {
                            loc.keywords.forEach(keyword => {
                                if(article.title.includes(keyword)) {
                                    hasLocation = true;
                                    matchedLocation = loc;
                                }
                            });
                        });

                        // إذا تحقق الشرطان معاً، ارسم النقطة الحمراء
                        if(hasLocation && hasAction && matchedLocation) {
                            const strikeIcon = L.divIcon({ html: '<i class="fas fa-bullseye"></i>', className: 'strike-icon', iconSize: [24, 24] });
                            const marker = L.marker([matchedLocation.lat, matchedLocation.lng], {icon: strikeIcon})
                                 .addTo(map)
                                 .bindPopup(`<b style="color:red;">رصد حدث أمني مؤكد</b><br>${article.title}`);
                            strikeMarkers.push(marker);
                            newAlertFound = true; // تم العثور على حدث يستدعي التنبيه
                        }
                    });
                    
                    document.getElementById('ticker-text').innerHTML = newsHtml;
                    
                    // تشغيل التنبيه الصوتي إذا تم رسم نقطة جديدة
                    if(newAlertFound) {
                        playAlertSound();
                    }
                }
            } catch (e) { console.log("خطأ في جلب الأخبار", e); }
        }

        let flightMarkers = [];
        async function fetchRealFlights() {
            const api = 'https://opensky-network.org/api/states/all?lamin=12.0&lomin=34.0&lamax=38.0&lomax=60.0';
            try {
                const res = await fetch(api);
                const data = await res.json();
                
                flightMarkers.forEach(m => map.removeLayer(m));
                flightMarkers = [];

                if(data.states) {
                    const flights = data.states.slice(0, 40);
                    flights.forEach(flight => {
                        const lng = flight[5];
                        const lat = flight[6];
                        const angle = flight[10] || 0;
                        const callsign = flight[1] || "مجهول";
                        
                        const planeIcon = L.divIcon({
                            html: `<div style="transform: rotate(${angle - 45}deg);"><i class="fas fa-plane"></i></div>`,
                            className: 'plane-icon',
                            iconSize: [20, 20]
                        });

                        const marker = L.marker([lat, lng], {icon: planeIcon})
                                        .addTo(map)
                                        .bindPopup(`<b>رحلة مدنية:</b> ${callsign}<br><b>الارتفاع:</b> ${flight[7]} م`);
                        flightMarkers.push(marker);
                    });
                }
            } catch(e) {}
        }

        // تفادي تشغيل الصوت مع التحميل الأول للصفحة مباشرة لتجنب حظر المتصفحات للصوت التلقائي
        setTimeout(fetchLiveNews, 1000);
        fetchRealFlights();

        setInterval(fetchLiveNews, 180000);
        setInterval(fetchRealFlights, 60000);

    </script>
</body>
</html>
