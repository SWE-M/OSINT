<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Monitor - Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* 1. الخريطة (خلفية الشاشة بالكامل) */
        #map {
            width: 100%;
            height: calc(100% - 40px); /* ترك مساحة لشريط الأخبار بالأسفل */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. مربع البث المباشر (عائم فوق الخريطة) */
        #live-tv-box {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 350px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #cc0000;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(204, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tv-header {
            background-color: #cc0000;
            color: white;
            padding: 5px 10px;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .tv-header span.live-indicator {
            animation: blink 1s infinite;
        }

        /* 3. شريط الأخبار العاجلة (ثابت في الأسفل) */
        #news-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: #111;
            border-top: 2px solid #cc0000;
            z-index: 1000;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker-title {
            background-color: #cc0000;
            color: white;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            white-space: nowrap;
            z-index: 2;
        }

        .ticker-content {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            position: relative;
        }

        .scrolling-text {
            display: inline-block;
            padding-left: 100%;
            animation: scroll-left 25s linear infinite;
            color: #ffcc00;
            font-size: 1.1rem;
        }

        /* حركات الأنيميشن */
        @keyframes scroll-left {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100%, 0); }
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* أيقونات الخريطة */
        .combat-icon {
            background-color: #cc0000;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 10px #cc0000;
        }
        
        .ship-icon {
            background-color: #0066cc;
            border-radius: 0;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="live-tv-box">
        <div class="tv-header">
            <span>الجزيرة - بث مباشر</span>
            <span class="live-indicator">🔴 LIVE</span>
        </div>
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/bWeEQAUKKik?autoplay=1&mute=1" title="Live TV" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div id="news-ticker">
        <div class="ticker-title">عاجل ⚡</div>
        <div class="ticker-content">
            <div class="scrolling-text">
                أحدث التطورات: اعتراض أهداف جوية في سماء المنطقة ... | ... استمرار التشويش على أنظمة الملاحة وتوجيه السفن ... | ... تحركات لقطع بحرية في مياه الخليج وتفعيل منصات الدفاع الجوي.
            </div>
        </div>
    </div>

    <script>
        // إعداد الخريطة
        const map = L.map('map', {zoomControl: false}).setView([26.0, 51.0], 5);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        // طبقة الخريطة المظلمة
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // تخصيص الأيقونات (واحدة للقصف/الاشتباك، وواحدة للقطع البحرية)
        const combatMarker = L.divIcon({ className: 'combat-icon', iconSize: [15, 15] });
        const shipMarker = L.divIcon({ className: 'ship-icon', iconSize: [12, 12] });

        // إضافة نقاط محاكاة على الخريطة
        L.marker([29.5, 52.5], {icon: combatMarker}).addTo(map).bindPopup("<b>منصة إطلاق صواريخ</b><br>تم رصد نشاط قبل قليل");
        L.marker([25.2, 55.3], {icon: combatMarker}).addTo(map).bindPopup("<b>منظومة دفاع جوي</b><br>في وضع الاستعداد القصوى");
        L.marker([26.5, 53.0], {icon: shipMarker}).addTo(map).bindPopup("<b>بارجة عسكرية</b><br>تتحرك في المياه الدولية");

    </script>
</body>
</html>
